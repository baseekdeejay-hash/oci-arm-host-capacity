name: OCI ARM Instance Creator

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    name: Run script
    steps:
      - uses: actions/checkout@v1
      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress
      - name: Write private key to file
        run: |
          echo "${{ secrets.OCI_PRIVATE_KEY_FILENAME }}" > /tmp/oci_api_key.pem
          chmod 600 /tmp/oci_api_key.pem
      - name: Get Ubuntu 22.04 ARM image OCID
        id: get_image
        run: |
          pip install oci-cli --quiet
          mkdir -p ~/.oci
          printf '[DEFAULT]\nuser=${{ secrets.OCI_USER_ID }}\nfingerprint=${{ secrets.OCI_KEY_FINGERPRINT }}\nkey_file=/tmp/oci_api_key.pem\ntenancy=${{ secrets.OCI_TENANCY_ID }}\nregion=${{ secrets.OCI_REGION }}\n' > ~/.oci/config
          IMAGE_ID=$(oci compute image list --compartment-id "${{ secrets.OCI_TENANCY_ID }}" --operating-system "Canonical Ubuntu" --operating-system-version "22.04" --shape "VM.Standard.A1.Flex" --sort-by TIMECREATED --sort-order DESC --limit 1 --query 'data[0].id' --raw-output 2>/dev/null)
          echo "IMAGE_ID=$IMAGE_ID" >> $GITHUB_OUTPUT
          echo "Found ARM Ubuntu 22.04 image: $IMAGE_ID"
      - name: Run script
        run: php index.php
        env:
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_PRIVATE_KEY_FILENAME: /tmp/oci_api_key.pem
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ steps.get_image.outputs.IMAGE_ID }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          OCI_SHAPE: VM.Standard.A1.Flex
          OCI_OCPUS: 4
          OCI_MEMORY_IN_GBS: 24
          OCI_AVAILABILITY_DOMAIN: miZM:EU-MADRID-1-AD-1
          OCI_DISPLAY_NAME: servidor-freetier
          OCI_MAX_INSTANCES: 1
          OCI_BOOT_VOLUME_SIZE_IN_GBS: 50
